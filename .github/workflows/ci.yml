name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Node 20 on GH Actions is deprecated; opt into Node 24 ahead of the
# 2026-09-16 removal so the workflow doesn't break silently.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  static:
    name: typecheck + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (all workspaces)
        run: pnpm -r typecheck

      - name: Unit tests (all workspaces)
        run: pnpm -r test

  e2e-static:
    name: E2E (static — landing / sidebar / health badge)
    runs-on: ubuntu-latest
    needs: static
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cchub
          POSTGRES_PASSWORD: cchub
          POSTGRES_DB: cchub
        ports: ['5433:5432']
        options: >-
          --health-cmd="pg_isready -U cchub"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
    env:
      RUNNER_PORT: 4000
      RUNNER_API_TOKEN: dev-token-change-me-in-production-0000000000000000
      RUNNER_DATABASE_URL: postgres://cchub:cchub@localhost:5433/cchub
      RUNNER_WORKSPACE_ROOT: ./.runner-workspaces
      ANTHROPIC_API_KEY: not-used-in-ci
      DAILY_BUDGET_USD: '20'
      MONTHLY_BUDGET_USD: '300'
      MAX_PARALLEL_SESSIONS: '3'
      MAX_TURNS_PER_SESSION: '50'
      SESSION_TIME_LIMIT_SECONDS: '1800'
      TOOL_RESULT_MAX_BYTES: '524288'
      SSE_EVENT_MAX_BYTES: '262144'
      WEB_ORIGIN: http://localhost:3000
      CC_HUB_SANDBOX_IMAGE: cc-hub-sandbox:0.1.0
      # Deliberately unreachable — Langfuse badge should render in "未接続"
      # state, which quality.spec accepts as a valid state.
      LANGFUSE_HOST: http://localhost:9999
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @cc-hub/web exec playwright install --with-deps chromium

      - name: Apply DB migrations
        run: pnpm --filter @cc-hub/runner migrate

      - name: Start runner
        run: |
          pnpm --filter @cc-hub/runner exec tsx src/server.ts &
          echo $! > runner.pid
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4000/healthz > /dev/null; then
              echo "runner is up"; exit 0
            fi
            sleep 1
          done
          echo "runner failed to start"; exit 1

      - name: Start web (build then start)
        run: |
          pnpm --filter @cc-hub/web build
          pnpm --filter @cc-hub/web start &
          echo $! > web.pid
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null; then
              echo "web is up"; exit 0
            fi
            sleep 1
          done
          echo "web failed to start"; exit 1

      - name: Run static E2E (quality gates only)
        working-directory: apps/web
        # smoke + langfuse specs need a real Claude subscription + Docker
        # sandbox image, so they are local-only. quality.spec just hits
        # the landing UI and runs cleanly in CI.
        run: npx playwright test quality.spec.ts --project=chromium --reporter=list

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report/
            apps/web/test-results/
          retention-days: 7

      - name: Stop runner + web
        if: always()
        run: |
          kill $(cat runner.pid) 2>/dev/null || true
          kill $(cat web.pid) 2>/dev/null || true
