name: cc-hub-langfuse

services:
  langfuse-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
      TZ: UTC
    volumes:
      - langfuse-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U langfuse']
      interval: 5s
      timeout: 3s
      retries: 10

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:24.3
    restart: unless-stopped
    user: '101:101'
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - langfuse-ch-data:/var/lib/clickhouse
      - langfuse-ch-logs:/var/log/clickhouse-server

  langfuse-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: --requirepass langfuseredis
    volumes:
      - langfuse-redis-data:/data

  langfuse-minio:
    image: minio/minio:latest
    restart: unless-stopped
    entrypoint: sh
    command: -c 'mkdir -p /data/langfuse && minio server /data --console-address :9091'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
    ports:
      - '9090:9000'
      - '9091:9091'
    volumes:
      - langfuse-minio-data:/data

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    restart: unless-stopped
    depends_on:
      langfuse-db:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_started
      langfuse-redis:
        condition: service_started
      langfuse-minio:
        condition: service_started
    environment: &lf_env
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      SALT: ${LANGFUSE_SALT:-0c5d6ec6856d6d151ae0466917d5077b}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY:-488cb0f86d01d1807c605578fd61b61168fef5644f3e2666f96a136c5719b40e}
      TELEMETRY_ENABLED: 'false'
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-eab0bcca5ef223e3830be3afa96e877f6b244e1b36ad265817368d14c6890528}
      NEXTAUTH_URL: http://localhost:3100
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: miniosecret
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: 'true'
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_CLUSTER_ENABLED: 'false'
      REDIS_HOST: langfuse-redis
      REDIS_PORT: '6379'
      REDIS_AUTH: langfuseredis

  langfuse-web:
    image: langfuse/langfuse:3
    restart: unless-stopped
    depends_on:
      langfuse-worker:
        condition: service_started
    environment:
      <<: *lf_env
      HOSTNAME: 0.0.0.0
      PORT: '3000'
      LANGFUSE_INIT_ORG_ID: cc-hub
      LANGFUSE_INIT_ORG_NAME: CC Hub
      LANGFUSE_INIT_PROJECT_ID: cc-hub-phase1
      LANGFUSE_INIT_PROJECT_NAME: CC Hub Phase1
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: pk-lf-cchub-phase1
      LANGFUSE_INIT_PROJECT_SECRET_KEY: sk-lf-cchub-phase1-secret
      LANGFUSE_INIT_USER_EMAIL: local@cc-hub.local
      LANGFUSE_INIT_USER_NAME: Local User
      LANGFUSE_INIT_USER_PASSWORD: cchub-local-password
    ports:
      - '3100:3000'

volumes:
  langfuse-db-data:
  langfuse-ch-data:
  langfuse-ch-logs:
  langfuse-redis-data:
  langfuse-minio-data:
