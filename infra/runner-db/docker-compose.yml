name: cc-hub-runner-db

services:
  postgres:
    image: postgres:16-alpine
    container_name: cc-hub-runner-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cchub
      POSTGRES_PASSWORD: cchub
      POSTGRES_DB: cchub
      TZ: UTC
      PGTZ: UTC
    ports:
      - '5433:5432'
    volumes:
      - cc-hub-runner-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cchub']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  cc-hub-runner-db-data:
    name: cc-hub-runner-db-data
